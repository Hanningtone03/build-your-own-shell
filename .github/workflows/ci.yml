name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Syntax check
        run: python -m py_compile src/shell.py src/parser.py src/builtins.py src/executor.py
      - name: Test echo command
        run: echo "exit" | python -m src.shell || true